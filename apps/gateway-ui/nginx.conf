# SPA static serving + API reverse proxy (FR-005).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Forward /api/* to the backend over the Docker network. The trailing slash
    # on proxy_pass strips the /api prefix, so the SPA's GET /api/health reaches
    # the backend as GET /health.
    location /api/ {
        proxy_pass http://gateway-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback: any unmatched path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
